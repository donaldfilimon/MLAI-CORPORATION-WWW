<svg width="128" height="128" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MLAI Corporation">
  <defs>
    <linearGradient id="mlai-bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="mlai-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="6" y="6" width="52" height="52" rx="15" fill="url(#mlai-bg)"/>
  <rect x="6.75" y="6.75" width="50.5" height="50.5" rx="14.25" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <g filter="url(#mlai-glow)">
    <!-- M-shaped weighted directed backtrace: edges + nodes -->
    <path d="M19 44 L19 22 L32 32 L45 22 L45 44" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <circle cx="19" cy="44" r="4.4" fill="#FFFFFF"/>
    <circle cx="19" cy="22" r="3.7" fill="#FFFFFF"/>
    <circle cx="32" cy="32" r="3.2" fill="#FFFFFF"/>
    <circle cx="45" cy="22" r="3.7" fill="#FFFFFF"/>
    <circle cx="45" cy="44" r="4.4" fill="#FFFFFF" opacity="0.92"/>
  </g>
</svg>
