<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLAI Corporation | Advanced AI Research</title>
  <meta name="description" content="MLAI Corporation builds private, traceable AI infrastructure for teams moving agents, retrieval, and evaluation from demos to governed production systems.">
  <meta name="theme-color" content="#08090c">

  <!-- Fonts: body/sans (Geist) is self-hosted via @fontsource in CSS.
       Display (Outfit) + mono (JetBrains Mono) load async (non-render-blocking)
       via the print→all swap so they never block first paint. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
  </noscript>
</head>
<body class="bg-[#08090c] text-[#fafafa] antialiased selection:bg-emerald-500/30">

</body>
</html>
